front:
  text: 金籙十回度人晚朝轉經儀
  hash: sha256:cd5793b7f6b65e13e4574b3b013b26a437a88022ef8a38259fb371588381a36a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0191_HFL_000-001a, image: hfl/0267/0267-176.png}
body:
  text: 師堂序立法事高功跪啓具位臣某重伸上啓靈寶玄中大法師真君靈寶經師君藉師君度師君正一天師君女師嗣師系師君靈寶監齊大法師真君赤明開圖黍珠授受一派宗師恭望師慈俯回洞鑒臣聞靈寶本章總百魔之隱韻上品妙首敷十轉之玄功兹再演於經科庸仰干於師造臣今入意以今引領官衆升壇轉誦太上洞玄靈寶無量度人上品妙經第九回至第十回敬為祝延萬壽保天長存全賴師慈主盟壇席庶使響徹三天聲聞九地一切有情同沾利益專俟恩命宣演經科臣等干冒師嚴下情不勝虔禱之至領衆升壇恭行典式唱道引至壇前序立次第升壇上香信禮各禮師存念如法玉音攝氣靈風聚煙紫虛鬱秀輔翼萬仙千和萬合自然成真鳴法鼓二十四通無上玄元太上道君召出臣等身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人出關啓所言臣今為某入意願得太上降賜十方正真生氣流注臣等身中令臣所啓速逹經御無上三十二天元始上帝至尊御前請稱法位具位臣某大謝謹同誠上啓太上無極大道虛無自然元始天尊妙無上帝玄皇高聖太上玉晨大道君靈寶天尊妙有上帝混沌萬變玄元老君道德天尊至真上帝昊天玉皇上帝元陽慈父大道君靈寶玉母大道君南極天皇上帝北極紫微大帝朱陵度命天尊后土皇地祇十方無極太上靈寶天尊巳得道大聖衆至真諸君丈人三十二天帝君東華南極西靈北真玄都玉京金闕七寶瓊臺紫微上宮靈寶至真明皇道君上相上宰上保上傅玄中太皇上帝高真三十六部尊經玄中大法師五帝三官四司九府日月五星南辰北斗二十八宿璇璣玉衡列象星真十方無極至真大神飛天神王長生無量度人君天真皇人妙行真人靈寶三師監齊大法師侍經五帝玉童玉女典經玉郎三洞侍經靈寶官屬三界五帝大勳魔王三界官屬應感真靈恭望洪慈俯回洞鑒臣聞空梵成文雖隱顯龍康之劫法輪啓祕有彌綸宇宙之功顧茲口誦以心惟諒哉聲發而響應臣某倥侗何取僕遫無庸幸因緣運之遭逢遂竊篇章而紬繹屬當夜奏再畢經功分隂分陽考數巳窮於竒耦徹上徹下疏恩諒博於高卑稽首歸依無極大道經心開悟解受持讀誦至心歸依十方道寶當願衆生起心回向一切信禮師普上法橋無有障礙宿命讃侍經宣第九回開經科敷座吟靜念如法開經玄藴呪請轉法輪師題經誦經畢解座吟侍經回向智惠頌師同齊官旋至上方上香再拜臣恭以空洞靈章美成九轉雲營流響透徹十方恭惟上方無極太上靈寶天尊上方無極飛天神王長生大聖無量度人君位鎮圓羅功施洪覆寶珠勃勃親聞金口之說經雲層峩峩常與玉京之聽政伏願臨下有赫申命用休隂陽寒暑得其平物無疵癘日月星辰麗乎正國有禎祥具有表文謹當宣告宣表關焚化侍經宣第十回開經科敷座讃請轉法輪師舉經存思如初道言昔於始青天中云云大量玄玄也解座吟侍經回向智惠頌旋至下方上香再拜臣恭以行香誦經始終十遍祈恩請命表裏一誠恭惟下方無極太上靈寶天尊下方無極飛天神王長生大聖無量度人君命式九圍光被四表惟總御大小必承宣道化以旁周而普度天人非推廣經功而莫可伏願錫之終惠介以純禧大書特書不一書明標功籍有色無色非有色均囿化鈞具有表文謹當宣告宣表關焚化侍經宣普嘆經文三聞經師收經讃收經得道普福天人無上玄元無邊睿澤當願帝王保鎮國祚安寧永樂太平長享清靜和稽首歸依無極大道師叩齒三十六通心拜十方而退東向心禮三拜瞑目密呪曰臣某謹誦元始度人上品妙經十遍既同乞發龍軿天神下降役使六甲七祖飛升我騰上清呪畢叩齒三通咽液三過北向心禮三拜瞑目呪曰上皇天真使我升靈清齊澡錬誦詠靈書七玄披散上朝太盧廷年長存刻名録書呪畢叩齒九通咽液十過納官如法臣誦經巳竟向來所出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人請還入臣等身中復於宮室母令差互後召又到一如故事師精思還宮畢叩齒三通咽液三過發願復爐如故仙靈仙官金童玉女五帝五嶽神仙真人三氣正神左右龍虎君天仙地仙五靈香官當今召致十方正氣自然生金液丹碧芝英百靈衆真交㑹在此香火爐前當願十方仙童玉女侍衛香煙傳臣向來所啓之言速逹徑御無上三十二天元始上帝至尊御前下壇前謝神王具位臣某謹重誠上啓十方無極飛天神王長生大聖無量度人君十方飛天使者十天玉女十方一切神仙官屬咸望洪慈洞回昭鍳向來欽奉綸音崇修金籙大齊轉誦太上洞玄靈寶無量度人上品妙經十遍仰勤鑒證幸已周圓謹竭丹誠徑伸謁謝伏念某等骨相非仙血尸尚穢宣行雲篆豈能應之手得之心諷誦天書不過出乎口入乎耳存思迷謬音響號呶未能致冥慧洞清之天而先招輕泄漏慢之過仰祈春育曲賜海涵叩謝疏文謹當宣讀宣疏疏文宣竟諒賜鑒觀伏願聖心寬綽宇宙含洪不加斧鉞之誅曲賜帡幪之造使經教昭布乎寰宇而道恩光被于邦家法衆虔誠謹當奉送直壇引下壇詣幕謝師師上香再拜具位臣某重伸上啓靈寶玄中大法師真君靈寶經師君籍師君度師君正一天師君女師嗣師系師君靈寶監齊大法師真君赤明開圖黍珠授受一派宗師恭望師慈俯觀謝悃伏以屢控師垣宏宣寶笈巳蒙開悟幸遂周圓恭詣師階特攄謝悃臣向來引領官衆升壇轉詠太上洞玄靈寶無量度人上品妙經第九回至第十回巳遂周圓仰荷師恩克成善念徑殫愚悃謁謝玄堂重念某體未洞真故莫窮於玄奧學不至道愧未造於清虛伏望大造垂恩玄師錫慶俯憐末學不賜譴訶庶俾家國沾恩存亡獲福善功圓滿品彚生成干冒師嚴臣等下情不勝攀戀之至瞻仰天階傾心拜送修齊雲輿向來念善金籙十回度人晚朝轉經儀
